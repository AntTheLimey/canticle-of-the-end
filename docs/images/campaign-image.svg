<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#241e16" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#140f0a"/>
      <stop offset="100%" stop-color="#0a0705"/>
    </radialGradient>
    <radialGradient id="inner-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6b4a2a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6b4a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eldritch-glow" cx="50%" cy="48%" r="35%">
      <stop offset="0%" stop-color="#4a6b3a" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#2a3d1e" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#2a3d1e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fork-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a55a"/>
      <stop offset="100%" stop-color="#7a5e2e"/>
    </linearGradient>
    <linearGradient id="bell-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a55a"/>
      <stop offset="40%" stop-color="#a07830"/>
      <stop offset="100%" stop-color="#5a3e18"/>
    </linearGradient>
    <linearGradient id="crack-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a6b3a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2a3d1e" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="eldritch-blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="400" cy="400" r="370"/>
    </clipPath>
    <!-- Parchment texture noise -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Background — warm umber darkness -->
  <rect width="800" height="800" fill="#0a0705"/>
  <circle cx="400" cy="400" r="370" fill="url(#bg-glow)"/>
  <circle cx="400" cy="400" r="250" fill="url(#inner-glow)"/>
  <circle cx="400" cy="380" r="280" fill="url(#eldritch-glow)"/>

  <!-- Subtle parchment texture overlay -->
  <rect width="800" height="800" fill="#d4c5a9" opacity="0.015" filter="url(#grain)"/>

  <!-- Outer ornamental ring — Regency gilded frame -->
  <circle cx="400" cy="400" r="362" fill="none" stroke="#c9a55a" stroke-width="0.4" opacity="0.2"/>
  <circle cx="400" cy="400" r="358" fill="none" stroke="#c9a55a" stroke-width="1.8" opacity="0.45"/>
  <circle cx="400" cy="400" r="353" fill="none" stroke="#c9a55a" stroke-width="0.4" opacity="0.15"/>
  <circle cx="400" cy="400" r="342" fill="none" stroke="#c9a55a" stroke-width="0.4" opacity="0.15"/>
  <circle cx="400" cy="400" r="338" fill="none" stroke="#c9a55a" stroke-width="1.8" opacity="0.45"/>
  <circle cx="400" cy="400" r="334" fill="none" stroke="#c9a55a" stroke-width="0.4" opacity="0.2"/>

  <!-- Regency corner flourishes (4 cardinal points) -->
  <g fill="none" stroke="#c9a55a" stroke-width="1" opacity="0.35" stroke-linecap="round">
    <!-- Top flourish -->
    <path d="M 380,48 Q 390,38 400,35 Q 410,38 420,48"/>
    <path d="M 370,52 Q 385,40 400,32 Q 415,40 430,52"/>
    <line x1="400" y1="32" x2="400" y2="25"/>
    <circle cx="400" cy="22" r="2.5" fill="#c9a55a" stroke="none"/>
    <!-- Bottom flourish -->
    <path d="M 380,752 Q 390,762 400,765 Q 410,762 420,752"/>
    <path d="M 370,748 Q 385,760 400,768 Q 415,760 430,748"/>
    <line x1="400" y1="768" x2="400" y2="775"/>
    <circle cx="400" cy="778" r="2.5" fill="#c9a55a" stroke="none"/>
    <!-- Left flourish -->
    <path d="M 48,380 Q 38,390 35,400 Q 38,410 48,420"/>
    <path d="M 52,370 Q 40,385 32,400 Q 40,415 52,430"/>
    <line x1="32" y1="400" x2="25" y2="400"/>
    <circle cx="22" cy="400" r="2.5" fill="#c9a55a" stroke="none"/>
    <!-- Right flourish -->
    <path d="M 752,380 Q 762,390 765,400 Q 762,410 752,420"/>
    <path d="M 748,370 Q 760,385 768,400 Q 760,415 748,430"/>
    <line x1="768" y1="400" x2="775" y2="400"/>
    <circle cx="778" cy="400" r="2.5" fill="#c9a55a" stroke="none"/>
  </g>

  <!-- Decorative rosettes on the outer ring (8 ritual cities) -->
  <g opacity="0.4" fill="#c9a55a">
    <circle cx="400" cy="45" r="3.5"/><circle cx="400" cy="45" r="6.5" fill="none" stroke="#c9a55a" stroke-width="0.7"/>
    <circle cx="651" cy="149" r="3.5"/><circle cx="651" cy="149" r="6.5" fill="none" stroke="#c9a55a" stroke-width="0.7"/>
    <circle cx="755" cy="400" r="3.5"/><circle cx="755" cy="400" r="6.5" fill="none" stroke="#c9a55a" stroke-width="0.7"/>
    <circle cx="651" cy="651" r="3.5"/><circle cx="651" cy="651" r="6.5" fill="none" stroke="#c9a55a" stroke-width="0.7"/>
    <circle cx="400" cy="755" r="3.5"/><circle cx="400" cy="755" r="6.5" fill="none" stroke="#c9a55a" stroke-width="0.7"/>
    <circle cx="149" cy="651" r="3.5"/><circle cx="149" cy="651" r="6.5" fill="none" stroke="#c9a55a" stroke-width="0.7"/>
    <circle cx="45" cy="400" r="3.5"/><circle cx="45" cy="400" r="6.5" fill="none" stroke="#c9a55a" stroke-width="0.7"/>
    <circle cx="149" cy="149" r="3.5"/><circle cx="149" cy="149" r="6.5" fill="none" stroke="#c9a55a" stroke-width="0.7"/>
  </g>

  <!-- Connecting lines between ritual points — the harmonic web -->
  <g stroke="#4a6b3a" stroke-width="0.5" opacity="0.12">
    <line x1="400" y1="45" x2="400" y2="755"/>
    <line x1="651" y1="149" x2="149" y2="651"/>
    <line x1="755" y1="400" x2="45" y2="400"/>
    <line x1="651" y1="651" x2="149" y2="149"/>
  </g>

  <!-- Inner concentric rings — ritual geometry -->
  <g fill="none" stroke="#4a6b3a" opacity="0.07" stroke-width="0.6">
    <circle cx="400" cy="400" r="280"/>
    <circle cx="400" cy="400" r="230"/>
    <circle cx="400" cy="400" r="180"/>
    <circle cx="400" cy="400" r="130"/>
    <circle cx="400" cy="400" r="80"/>
  </g>

  <!-- Tentacular sound waves — emerging from darkness -->
  <g clip-path="url(#circle-clip)">
    <!-- Wave 1 — left, becoming organic -->
    <path d="M 50,400 Q 100,365 150,400 Q 200,435 250,400 Q 280,380 300,360 Q 320,335 335,300 Q 348,265 358,230 Q 365,205 368,180"
          fill="none" stroke="#4a6b3a" stroke-width="2" opacity="0.18" stroke-linecap="round"/>
    <path d="M 55,415 Q 115,380 165,415 Q 215,445 265,415 Q 295,398 315,380 Q 338,355 350,320 Q 360,290 368,260"
          fill="none" stroke="#4a6b3a" stroke-width="1.2" opacity="0.1" stroke-linecap="round"/>
    <!-- Sucker-like dots along the tentacle -->
    <g fill="#4a6b3a" opacity="0.08">
      <circle cx="250" cy="400" r="2.5"/>
      <circle cx="300" cy="362" r="2"/>
      <circle cx="335" cy="302" r="1.8"/>
      <circle cx="355" cy="240" r="1.5"/>
    </g>

    <!-- Wave 2 — right -->
    <path d="M 750,400 Q 700,435 650,400 Q 600,365 550,400 Q 520,420 500,440 Q 478,465 465,498 Q 455,530 448,560 Q 442,585 438,610"
          fill="none" stroke="#4a6b3a" stroke-width="2" opacity="0.18" stroke-linecap="round"/>
    <path d="M 745,385 Q 685,420 635,385 Q 585,355 535,385 Q 505,403 485,420 Q 465,445 452,475 Q 442,508 435,540"
          fill="none" stroke="#4a6b3a" stroke-width="1.2" opacity="0.1" stroke-linecap="round"/>
    <g fill="#4a6b3a" opacity="0.08">
      <circle cx="550" cy="400" r="2.5"/>
      <circle cx="500" cy="438" r="2"/>
      <circle cx="465" cy="496" r="1.8"/>
      <circle cx="450" cy="555" r="1.5"/>
    </g>

    <!-- Wave 3 — top, descending -->
    <path d="M 400,55 Q 365,110 400,165 Q 435,215 400,260 Q 382,290 372,315"
          fill="none" stroke="#4a6b3a" stroke-width="1.5" opacity="0.12" stroke-linecap="round"/>

    <!-- Wave 4 — bottom, ascending -->
    <path d="M 400,745 Q 435,690 400,635 Q 365,585 400,540 Q 418,515 428,490"
          fill="none" stroke="#4a6b3a" stroke-width="1.5" opacity="0.12" stroke-linecap="round"/>
  </g>

  <!-- The Unstruck Bell — central, ominous -->
  <g transform="translate(400, 335)" filter="url(#glow)">
    <!-- Eldritch glow behind the bell -->
    <ellipse cx="0" cy="10" rx="70" ry="50" fill="#4a6b3a" opacity="0.04" filter="url(#eldritch-blur)"/>

    <!-- Bell suspension bar -->
    <rect x="-28" y="-90" width="56" height="7" rx="2" fill="#a07830" opacity="0.6"/>
    <!-- Ornamental finial -->
    <circle cx="0" cy="-95" r="4" fill="#c9a55a" opacity="0.4"/>
    <!-- Suspension chain -->
    <line x1="0" y1="-83" x2="0" y2="-58" stroke="#a07830" stroke-width="2.5" opacity="0.5"/>

    <!-- Bell body — heavier, more imposing -->
    <path d="M -40,-58 Q -43,-30 -48,5 Q -52,30 -56,50 L -62,62 Q -35,74 0,78 Q 35,74 62,62 L 56,50 Q 52,30 48,5 Q 43,-30 40,-58 Z"
          fill="url(#bell-grad)" opacity="0.55" stroke="#c9a55a" stroke-width="0.8"/>
    <!-- Bell rim highlight -->
    <ellipse cx="0" cy="68" rx="62" ry="10" fill="none" stroke="#c9a55a" stroke-width="1.2" opacity="0.35"/>
    <!-- Bell crown -->
    <ellipse cx="0" cy="-58" rx="40" ry="6" fill="#a07830" opacity="0.4"/>

    <!-- Hairline crack in the bell — something is wrong -->
    <path d="M 12,-40 L 14,-25 L 10,-10 L 15,8 L 11,22 L 16,38"
          fill="none" stroke="#4a6b3a" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>

    <!-- Clapper — separated, unstruck, slightly askew -->
    <line x1="2" y1="-22" x2="-1" y2="50" stroke="#7a5e2e" stroke-width="2.8" opacity="0.45"/>
    <circle cx="-1" cy="54" r="7" fill="#7a5e2e" opacity="0.45"/>
  </g>

  <!-- The Abyss beneath the bell — spiraling void -->
  <g transform="translate(400, 468)">
    <ellipse cx="0" cy="0" rx="85" ry="22" fill="none" stroke="#4a6b3a" stroke-width="1" opacity="0.2"/>
    <ellipse cx="0" cy="5" rx="65" ry="16" fill="none" stroke="#4a6b3a" stroke-width="0.8" opacity="0.16"/>
    <ellipse cx="0" cy="10" rx="45" ry="11" fill="none" stroke="#4a6b3a" stroke-width="0.7" opacity="0.12"/>
    <ellipse cx="0" cy="14" rx="25" ry="7" fill="none" stroke="#4a6b3a" stroke-width="0.6" opacity="0.08"/>
    <ellipse cx="0" cy="17" rx="10" ry="4" fill="#0a0705" stroke="#4a6b3a" stroke-width="0.5" opacity="0.15"/>
  </g>

  <!-- Circle of tuning forks (8, matching ritual sites) -->
  <g filter="url(#glow)">
    <g transform="translate(400, 155) rotate(0)">
      <line x1="-5" y1="0" x2="-5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="5" y1="0" x2="5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <path d="M -5,-32 Q -5,-40 0,-42 Q 5,-40 5,-32" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="16" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    </g>
    <g transform="translate(573, 227) rotate(45)">
      <line x1="-5" y1="0" x2="-5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="5" y1="0" x2="5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <path d="M -5,-32 Q -5,-40 0,-42 Q 5,-40 5,-32" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="16" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    </g>
    <g transform="translate(645, 400) rotate(90)">
      <line x1="-5" y1="0" x2="-5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="5" y1="0" x2="5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <path d="M -5,-32 Q -5,-40 0,-42 Q 5,-40 5,-32" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="16" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    </g>
    <g transform="translate(573, 573) rotate(135)">
      <line x1="-5" y1="0" x2="-5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="5" y1="0" x2="5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <path d="M -5,-32 Q -5,-40 0,-42 Q 5,-40 5,-32" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="16" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    </g>
    <g transform="translate(400, 645) rotate(180)">
      <line x1="-5" y1="0" x2="-5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="5" y1="0" x2="5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <path d="M -5,-32 Q -5,-40 0,-42 Q 5,-40 5,-32" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="16" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    </g>
    <g transform="translate(227, 573) rotate(225)">
      <line x1="-5" y1="0" x2="-5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="5" y1="0" x2="5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <path d="M -5,-32 Q -5,-40 0,-42 Q 5,-40 5,-32" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="16" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    </g>
    <g transform="translate(155, 400) rotate(270)">
      <line x1="-5" y1="0" x2="-5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="5" y1="0" x2="5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <path d="M -5,-32 Q -5,-40 0,-42 Q 5,-40 5,-32" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="16" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    </g>
    <g transform="translate(227, 227) rotate(315)">
      <line x1="-5" y1="0" x2="-5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="5" y1="0" x2="5" y2="-32" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <path d="M -5,-32 Q -5,-40 0,-42 Q 5,-40 5,-32" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="16" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    </g>
  </g>

  <!-- Musical staff lines — warped, decaying -->
  <g opacity="0.1" stroke="#c9a55a" stroke-width="0.6" clip-path="url(#circle-clip)">
    <path d="M 100,515 Q 250,508 400,525 Q 550,542 700,510" fill="none"/>
    <path d="M 100,525 Q 250,518 400,535 Q 550,552 700,520" fill="none"/>
    <path d="M 100,535 Q 250,528 400,545 Q 550,562 700,530" fill="none"/>
    <path d="M 100,545 Q 250,538 400,555 Q 550,572 700,540" fill="none"/>
    <path d="M 100,555 Q 250,548 400,565 Q 550,582 700,550" fill="none"/>
  </g>

  <!-- Musical notes — some proper, some corrupted -->
  <g fill="#c9a55a" opacity="0.14">
    <ellipse cx="200" cy="520" rx="6" ry="4.5" transform="rotate(-15, 200, 520)"/>
    <ellipse cx="280" cy="538" rx="6" ry="4.5" transform="rotate(-15, 280, 538)"/>
    <ellipse cx="350" cy="530" rx="6" ry="4.5" transform="rotate(-15, 350, 530)"/>
    <ellipse cx="500" cy="555" rx="6" ry="4.5" transform="rotate(-15, 500, 555)"/>
    <ellipse cx="580" cy="535" rx="6" ry="4.5" transform="rotate(-15, 580, 535)"/>
  </g>
  <!-- Corrupted notes — bleeding off staff, wrong color -->
  <g fill="#4a6b3a" opacity="0.15">
    <ellipse cx="450" cy="582" rx="8" ry="5.5" transform="rotate(-30, 450, 582)"/>
    <ellipse cx="620" cy="505" rx="9" ry="6" transform="rotate(-45, 620, 505)"/>
    <ellipse cx="160" cy="548" rx="7" ry="5" transform="rotate(20, 160, 548)"/>
  </g>

  <!-- Title arc — top -->
  <path id="title-arc" d="M 150,400 A 250,250 0 0,1 650,400" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="23" fill="#c9a55a" opacity="0.65" letter-spacing="7" filter="url(#glow)">
    <textPath href="#title-arc" startOffset="50%" text-anchor="middle">CANTICLE OF THE END</textPath>
  </text>

  <!-- Subtitle arc — bottom -->
  <path id="subtitle-arc" d="M 165,400 A 235,235 0 0,0 635,400" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#8a7e6a" opacity="0.45" letter-spacing="3.5">
    <textPath href="#subtitle-arc" startOffset="50%" text-anchor="middle">REGENCY CTHULHU ~ MDCCCXIV</textPath>
  </text>

  <!-- Outer vignette — heavy, oppressive -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="#0a0705" stop-opacity="0"/>
    <stop offset="85%" stop-color="#0a0705" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#0a0705" stop-opacity="0.9"/>
  </radialGradient>
  <rect width="800" height="800" fill="url(#vignette)"/>
</svg>
