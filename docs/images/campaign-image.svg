<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2f3a" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#0d1a22"/>
      <stop offset="100%" stop-color="#060d11"/>
    </radialGradient>
    <radialGradient id="inner-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d8a7a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3d8a7a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fork-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#8a6d3b"/>
    </linearGradient>
    <linearGradient id="bell-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b87a"/>
      <stop offset="50%" stop-color="#a8894a"/>
      <stop offset="100%" stop-color="#6b5530"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="400" cy="400" r="370"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#060d11"/>
  <circle cx="400" cy="400" r="370" fill="url(#bg-glow)"/>
  <circle cx="400" cy="400" r="250" fill="url(#inner-glow)"/>

  <!-- Outer ornamental ring — Regency-style -->
  <circle cx="400" cy="400" r="360" fill="none" stroke="#c9a96e" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="400" r="355" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>
  <circle cx="400" cy="400" r="345" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity="0.3"/>
  <circle cx="400" cy="400" r="340" fill="none" stroke="#c9a96e" stroke-width="1.5" opacity="0.6"/>

  <!-- Decorative rosettes on the outer ring (8 positions for 8 ritual cities) -->
  <g opacity="0.5" fill="#c9a96e">
    <circle cx="400" cy="45" r="4"/><circle cx="400" cy="45" r="7" fill="none" stroke="#c9a96e" stroke-width="0.8"/>
    <circle cx="651" cy="149" r="4"/><circle cx="651" cy="149" r="7" fill="none" stroke="#c9a96e" stroke-width="0.8"/>
    <circle cx="755" cy="400" r="4"/><circle cx="755" cy="400" r="7" fill="none" stroke="#c9a96e" stroke-width="0.8"/>
    <circle cx="651" cy="651" r="4"/><circle cx="651" cy="651" r="7" fill="none" stroke="#c9a96e" stroke-width="0.8"/>
    <circle cx="400" cy="755" r="4"/><circle cx="400" cy="755" r="7" fill="none" stroke="#c9a96e" stroke-width="0.8"/>
    <circle cx="149" cy="651" r="4"/><circle cx="149" cy="651" r="7" fill="none" stroke="#c9a96e" stroke-width="0.8"/>
    <circle cx="45" cy="400" r="4"/><circle cx="45" cy="400" r="7" fill="none" stroke="#c9a96e" stroke-width="0.8"/>
    <circle cx="149" cy="149" r="4"/><circle cx="149" cy="149" r="7" fill="none" stroke="#c9a96e" stroke-width="0.8"/>
  </g>

  <!-- Connecting lines between the 8 ritual points — the harmonic web -->
  <g stroke="#3d8a7a" stroke-width="0.5" opacity="0.2">
    <line x1="400" y1="45" x2="400" y2="755"/>
    <line x1="651" y1="149" x2="149" y2="651"/>
    <line x1="755" y1="400" x2="45" y2="400"/>
    <line x1="651" y1="651" x2="149" y2="149"/>
  </g>

  <!-- Inner geometric pattern — harmonic spiral -->
  <g fill="none" stroke="#3d8a7a" opacity="0.12" stroke-width="0.8">
    <circle cx="400" cy="400" r="280"/>
    <circle cx="400" cy="400" r="230"/>
    <circle cx="400" cy="400" r="180"/>
    <circle cx="400" cy="400" r="130"/>
    <circle cx="400" cy="400" r="80"/>
  </g>

  <!-- Sound wave patterns that become tentacular -->
  <g clip-path="url(#circle-clip)">
    <!-- Wave 1 — left side, morphing into tentacle -->
    <path d="M 50,400 Q 100,370 150,400 Q 200,430 250,400 Q 280,385 300,370 Q 320,350 330,320 Q 340,280 355,250 Q 365,230 370,200"
          fill="none" stroke="#3d8a7a" stroke-width="1.8" opacity="0.3" stroke-linecap="round"/>
    <path d="M 50,410 Q 110,380 160,410 Q 210,440 260,410 Q 290,395 310,380 Q 330,360 345,330 Q 355,300 365,270"
          fill="none" stroke="#3d8a7a" stroke-width="1.2" opacity="0.2" stroke-linecap="round"/>

    <!-- Wave 2 — right side -->
    <path d="M 750,400 Q 700,430 650,400 Q 600,370 550,400 Q 520,415 500,430 Q 480,450 470,480 Q 460,520 445,550 Q 435,570 430,600"
          fill="none" stroke="#3d8a7a" stroke-width="1.8" opacity="0.3" stroke-linecap="round"/>
    <path d="M 750,390 Q 690,420 640,390 Q 590,360 540,390 Q 510,405 490,420 Q 470,440 455,470 Q 445,500 435,530"
          fill="none" stroke="#3d8a7a" stroke-width="1.2" opacity="0.2" stroke-linecap="round"/>

    <!-- Wave 3 — top, descending -->
    <path d="M 400,60 Q 370,110 400,160 Q 430,210 400,250 Q 385,275 375,300"
          fill="none" stroke="#3d8a7a" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>

    <!-- Wave 4 — bottom, ascending -->
    <path d="M 400,740 Q 430,690 400,640 Q 370,590 400,550 Q 415,525 425,500"
          fill="none" stroke="#3d8a7a" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  </g>

  <!-- The Unstruck Bell — central motif -->
  <g transform="translate(400, 340)" filter="url(#glow)">
    <!-- Bell suspension bar -->
    <rect x="-25" y="-85" width="50" height="6" rx="2" fill="#a8894a" opacity="0.7"/>
    <!-- Suspension chain -->
    <line x1="0" y1="-79" x2="0" y2="-55" stroke="#a8894a" stroke-width="2" opacity="0.6"/>
    <!-- Bell body -->
    <path d="M -35,-55 Q -38,-30 -42,0 Q -45,25 -50,45 L -55,55 Q -30,65 0,68 Q 30,65 55,55 L 50,45 Q 45,25 42,0 Q 38,-30 35,-55 Z"
          fill="url(#bell-grad)" opacity="0.6" stroke="#c9a96e" stroke-width="0.8"/>
    <!-- Bell rim highlight -->
    <ellipse cx="0" cy="60" rx="55" ry="8" fill="none" stroke="#d4b87a" stroke-width="1" opacity="0.4"/>
    <!-- Bell crown -->
    <ellipse cx="0" cy="-55" rx="35" ry="5" fill="#a8894a" opacity="0.5"/>
    <!-- Clapper — separated, unstruck -->
    <line x1="0" y1="-20" x2="0" y2="45" stroke="#8a6d3b" stroke-width="2.5" opacity="0.5"/>
    <circle cx="0" cy="48" r="6" fill="#8a6d3b" opacity="0.5"/>
  </g>

  <!-- The Abyss beneath the bell — void spiral -->
  <g transform="translate(400, 460)">
    <ellipse cx="0" cy="0" rx="80" ry="20" fill="none" stroke="#3d8a7a" stroke-width="1" opacity="0.3"/>
    <ellipse cx="0" cy="5" rx="60" ry="15" fill="none" stroke="#3d8a7a" stroke-width="0.8" opacity="0.25"/>
    <ellipse cx="0" cy="10" rx="40" ry="10" fill="none" stroke="#3d8a7a" stroke-width="0.8" opacity="0.2"/>
    <ellipse cx="0" cy="13" rx="22" ry="6" fill="none" stroke="#3d8a7a" stroke-width="0.6" opacity="0.15"/>
    <ellipse cx="0" cy="15" rx="8" ry="3" fill="#0d1a22" stroke="#3d8a7a" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Circle of tuning forks (8, matching ritual sites) -->
  <g filter="url(#glow)">
    <!-- Fork at 0° (top) -->
    <g transform="translate(400, 160) rotate(0)">
      <line x1="-5" y1="0" x2="-5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="5" y1="0" x2="5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -5,-30 Q -5,-38 0,-40 Q 5,-38 5,-30" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.6"/>
      <line x1="0" y1="0" x2="0" y2="15" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    </g>
    <!-- Fork at 45° -->
    <g transform="translate(570, 230) rotate(45)">
      <line x1="-5" y1="0" x2="-5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="5" y1="0" x2="5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -5,-30 Q -5,-38 0,-40 Q 5,-38 5,-30" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.6"/>
      <line x1="0" y1="0" x2="0" y2="15" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    </g>
    <!-- Fork at 90° -->
    <g transform="translate(640, 400) rotate(90)">
      <line x1="-5" y1="0" x2="-5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="5" y1="0" x2="5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -5,-30 Q -5,-38 0,-40 Q 5,-38 5,-30" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.6"/>
      <line x1="0" y1="0" x2="0" y2="15" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    </g>
    <!-- Fork at 135° -->
    <g transform="translate(570, 570) rotate(135)">
      <line x1="-5" y1="0" x2="-5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="5" y1="0" x2="5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -5,-30 Q -5,-38 0,-40 Q 5,-38 5,-30" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.6"/>
      <line x1="0" y1="0" x2="0" y2="15" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    </g>
    <!-- Fork at 180° (bottom) -->
    <g transform="translate(400, 640) rotate(180)">
      <line x1="-5" y1="0" x2="-5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="5" y1="0" x2="5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -5,-30 Q -5,-38 0,-40 Q 5,-38 5,-30" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.6"/>
      <line x1="0" y1="0" x2="0" y2="15" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    </g>
    <!-- Fork at 225° -->
    <g transform="translate(230, 570) rotate(225)">
      <line x1="-5" y1="0" x2="-5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="5" y1="0" x2="5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -5,-30 Q -5,-38 0,-40 Q 5,-38 5,-30" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.6"/>
      <line x1="0" y1="0" x2="0" y2="15" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    </g>
    <!-- Fork at 270° -->
    <g transform="translate(160, 400) rotate(270)">
      <line x1="-5" y1="0" x2="-5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="5" y1="0" x2="5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -5,-30 Q -5,-38 0,-40 Q 5,-38 5,-30" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.6"/>
      <line x1="0" y1="0" x2="0" y2="15" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    </g>
    <!-- Fork at 315° -->
    <g transform="translate(230, 230) rotate(315)">
      <line x1="-5" y1="0" x2="-5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="5" y1="0" x2="5" y2="-30" stroke="url(#fork-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <path d="M -5,-30 Q -5,-38 0,-40 Q 5,-38 5,-30" fill="none" stroke="url(#fork-grad)" stroke-width="2" opacity="0.6"/>
      <line x1="0" y1="0" x2="0" y2="15" stroke="url(#fork-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    </g>
  </g>

  <!-- Musical staff lines — distorted, fading into chaos -->
  <g opacity="0.15" stroke="#c9a96e" stroke-width="0.6" clip-path="url(#circle-clip)">
    <path d="M 100,510 Q 250,505 400,520 Q 550,535 700,510" fill="none"/>
    <path d="M 100,520 Q 250,515 400,530 Q 550,545 700,520" fill="none"/>
    <path d="M 100,530 Q 250,525 400,540 Q 550,555 700,530" fill="none"/>
    <path d="M 100,540 Q 250,535 400,550 Q 550,565 700,540" fill="none"/>
    <path d="M 100,550 Q 250,545 400,560 Q 550,575 700,550" fill="none"/>
  </g>

  <!-- Scattered "notes" on the staff — some normal, some wrong -->
  <g fill="#c9a96e" opacity="0.2">
    <ellipse cx="200" cy="515" rx="6" ry="4.5" transform="rotate(-15, 200, 515)"/>
    <ellipse cx="280" cy="535" rx="6" ry="4.5" transform="rotate(-15, 280, 535)"/>
    <ellipse cx="350" cy="525" rx="6" ry="4.5" transform="rotate(-15, 350, 525)"/>
    <ellipse cx="500" cy="550" rx="6" ry="4.5" transform="rotate(-15, 500, 550)"/>
    <ellipse cx="580" cy="530" rx="6" ry="4.5" transform="rotate(-15, 580, 530)"/>
    <!-- Wrong notes — displaced, bleeding off the staff -->
    <ellipse cx="450" cy="575" rx="7" ry="5" transform="rotate(-25, 450, 575)" opacity="0.6"/>
    <ellipse cx="620" cy="505" rx="8" ry="5.5" transform="rotate(-40, 620, 505)" opacity="0.4"/>
  </g>

  <!-- Title arc — top -->
  <path id="title-arc" d="M 150,400 A 250,250 0 0,1 650,400" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#c9a96e" opacity="0.7" letter-spacing="6" filter="url(#glow)">
    <textPath href="#title-arc" startOffset="50%" text-anchor="middle">CANTICLE OF THE END</textPath>
  </text>

  <!-- Subtitle arc — bottom -->
  <path id="subtitle-arc" d="M 160,400 A 240,240 0 0,0 640,400" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#3d8a7a" opacity="0.5" letter-spacing="3">
    <textPath href="#subtitle-arc" startOffset="50%" text-anchor="middle">REGENCY CTHULHU ~ MDCCCXIV</textPath>
  </text>

  <!-- Outer vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
    <stop offset="60%" stop-color="#060d11" stop-opacity="0"/>
    <stop offset="100%" stop-color="#060d11" stop-opacity="0.8"/>
  </radialGradient>
  <rect width="800" height="800" fill="url(#vignette)"/>
</svg>